<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblio</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#fef0c6',
            creamAccent: '#fddc87',
            ink: '#210501',
            accent: '#88d5dd',
            secondary: '#ffc55c',
            danger: '#e7000b',
            amber: '#fed330',
            greem: '#00a63e',
            listbg: '#fddc8789',
            green: '#76ccb6',
            orange: '#e48329'
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    };
  </script>
</head>
<body class="bg-cream text-ink font-sans min-h-screen overflow-x-hidden flex items-start justify-center p-8">
  <main class="max-w-5xl w-full pt-12">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-8 items-center justify-center text-center md:text-left">
      <div class="md:col-span-2 flex justify-center">
        <img
          src="favicon.svg"
          alt="Biblio"
          class="hidden md:block md:w-4/5 h-auto rounded-full mx-auto md:mx-0"
        />
      </div>
      <div class="md:col-span-2">
        <p class="font-sans text-[0.7rem] font-medium tracking-[0.2em] uppercase text-orange mb-5">Sistema de gestión bibliotecaria</p>
        <h1 class="font-display text-[clamp(3rem,10vw,5rem)] font-semibold leading-none tracking-[-0.02em] text-ink mb-6">Biblio</h1>
        <p class="text-base leading-[1.7] text-ink opacity-70 mb-10">Gestiona de manera simple el préstamos de libros.</p>

        <button
          type="button"
          id="initial-btn"
          class="inline-block font-sans text-xs font-medium tracking-[0.15em] uppercase text-ink bg-accent border-2 border-accent px-10 py-4 cursor-pointer transition-colors duration-200 hover:bg-green hover:border-green motion-reduce:transition-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-accent focus-visible:outline-offset-4"
        >
          Descargar sistema
        </button>

        <div id="options" class="hidden gap-4 justify-center md:justify-start flex-wrap">
          <a
            href="https://forms.gle/e6amqZn1ZCdpzJi3A"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-block no-underline font-sans text-xs font-medium tracking-[0.15em] uppercase text-ink bg-creamAccent border-2 border-creamAccent px-10 py-4 cursor-pointer transition-colors duration-200 hover:bg-secondary hover:border-secondary motion-reduce:transition-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-accent focus-visible:outline-offset-4"
          >
            Descargar para biblioteca
          </a>
          <a
            id="personal-btn"
            href="https://github.com/CiroMirkin/biblio/releases/latest/download/Biblio-Setup.exe"
            class="inline-block no-underline font-sans text-xs font-medium tracking-[0.15em] uppercase text-ink bg-creamAccent border-2 border-creamAccent px-10 py-4 cursor-pointer transition-colors duration-200 hover:bg-secondary hover:border-secondary opacity-60 hover:opacity-100 motion-reduce:transition-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-accent focus-visible:outline-offset-4"
          >
            Descargar para uso personal
          </a>
        </div>

        <a
          id="update-btn"
          href="https://github.com/CiroMirkin/biblio/releases/latest/download/Biblio-Setup.exe"
          class="hidden no-underline font-sans text-xs font-medium tracking-[0.15em] uppercase text-ink bg-accent border-2 border-accent px-10 py-4 cursor-pointer transition-colors duration-200 hover:bg-green hover:border-green motion-reduce:transition-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-accent focus-visible:outline-offset-4"
        >
          Descargar última version
        </a>
      </div>
    </div>

    <div class="grid place-items-center">
      <section class="max-w-5xl mt-16 text-left bg-white/40 rounded-xl py-8 px-6 box-border w-screen ml-[calc(50%-50vw)] mr-[calc(50%-50vw)]">
        <h2 class="font-display text-2xl font-semibold text-center mb-6">Bibliotecas que usan Biblio</h2>
        <p id="libraries-status" class="text-center text-sm opacity-70">Cargando bibliotecas...</p>
        <ul id="libraries-list" class="w-full list-none flex flex-wrap justify-center gap-3 max-h-80 overflow-y-auto pr-1"></ul>
      </section>
    </div>

    <section class="w-full mt-20 flex justify-center">
      <div class="max-w-4xl">
        <img
          src="biblio.webp"
          alt="Biblio"
          class="w-full h-auto rounded-lg shadow-lg"
        />
      </div>
    </section>
  </main>

  <script>
    var STORAGE_KEY = 'biblio_download_clicked';
    var initialBtn = document.getElementById('initial-btn');
    var options = document.getElementById('options');
    var updateBtn = document.getElementById('update-btn');
    var libraryBtn = options.querySelector('a[href*="forms.gle"]');

    function showUpdateView() {
      initialBtn.classList.add('hidden');
      options.classList.remove('flex');
      options.classList.add('hidden');
      updateBtn.classList.remove('hidden');
    }

    function markClicked() {
      localStorage.setItem(STORAGE_KEY, 'true');
    }

    if (localStorage.getItem(STORAGE_KEY) === 'true') {
      showUpdateView();
    }

    initialBtn.addEventListener('click', function () {
      this.classList.add('hidden');
      options.classList.remove('hidden');
      options.classList.add('flex');
      markClicked();
    });

    libraryBtn.addEventListener('click', markClicked);

    var LIBRARIES_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTE1s6-PpXEkH_ZqkXfROa9gTX-qA-DFgQaZWlHWJ_63e2cWJzAoAGqLrVzW7QOyZ5KBmnQR21SiKs/pub?gid=1921314640&single=true&output=csv';
    var librariesStatus = document.getElementById('libraries-status');
    var librariesList = document.getElementById('libraries-list');

    function parseCsv(text) {
      var rows = [];
      var row = [];
      var field = '';
      var insideQuotes = false;

      for (var i = 0; i < text.length; i++) {
        var char = text[i];

        if (insideQuotes) {
          if (char === '"') {
            if (text[i + 1] === '"') {
              field += '"';
              i++;
            } else {
              insideQuotes = false;
            }
          } else {
            field += char;
          }
        } else {
          if (char === '"') {
            insideQuotes = true;
          } else if (char === ',') {
            row.push(field);
            field = '';
          } else if (char === '\r') {
            continue;
          } else if (char === '\n') {
            row.push(field);
            rows.push(row);
            row = [];
            field = '';
          } else {
            field += char;
          }
        }
      }

      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }

      return rows;
    }

    function renderLibraries(libraries) {
      if (libraries.length === 0) {
        librariesStatus.textContent = 'Todavía no hay bibliotecas registradas.';
        return;
      }

      librariesStatus.classList.add('hidden');
      librariesList.classList.remove('hidden');
      librariesList.classList.add('grid');

      libraries.forEach(function (library) {
        var item = document.createElement('li');
        item.className = 'w-full overflow-hidden text-ellipsis bg-listbg rounded-md py-3.5 px-4 pr-6';

        var name = document.createElement('div');
        name.className = 'font-sans font-medium text-[0.95rem]';
        name.textContent = library.nombre;

        var location = document.createElement('div');
        location.className = 'text-[0.8rem] opacity-70';
        location.textContent = [library.ciudad, library.provincia].filter(Boolean).join(', ');

        item.appendChild(name);
        item.appendChild(location);
        librariesList.appendChild(item);
      });
    }

    fetch(LIBRARIES_CSV_URL)
      .then(function (response) {
        if (!response.ok) {
          throw new Error('No se pudo obtener la lista de bibliotecas');
        }
        return response.text();
      })
      .then(function (csvText) {
        var rows = parseCsv(csvText);
        rows.shift();

        var libraries = rows
          .filter(function (row) {
            return row.length >= 4 && row[1].trim() !== '';
          })
          .map(function (row) {
            return {
              nombre: row[1].trim(),
              ciudad: row[2].trim(),
              provincia: row[3].trim()
            };
          })
          .sort(function (a, b) {
            return a.nombre.localeCompare(b.nombre, 'es');
          });

        renderLibraries(libraries);
      })
      .catch(function () {
        librariesStatus.textContent = 'No se pudo cargar la lista de bibliotecas en este momento.';
      });
  </script>
</body>
</html>
