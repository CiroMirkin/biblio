<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblio</title>
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-white: #fef0c6;
      --color-white-accent: #fddc87;
      --color-black: #210501;
      --color-accent: #88d5dd;
      --color-secondary: #ffc55c;
      --color-red: #e7000b;
      --color-amber: #fed330;
      --color-greem: #00a63e;
      --color-gray: #fddc8789;
      --color-green: #76ccb6;
      --color-orange: #e48329;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--color-white);
      color: var(--color-black);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-orange);
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--color-black);
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--color-black);
      margin-bottom: 2.5rem;
      opacity: 0.7;
    }

    .download-btn {
      display: inline-block;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-black);
      background: var(--color-accent);
      border: 2px solid var(--color-accent);
      padding: 1rem 2.5rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .download-btn:hover {
      background: var(--color-green);
      border-color: var(--color-green);
      color: var(--color-black);
    }

    .download-btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 4px;
    }

    .options {
      display: none;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .options.visible {
      display: flex;
    }

    .options .download-btn {
      background: var(--color-white-accent);
      border-color: var(--color-white-accent);
    }

    .options .download-btn:hover {
      background: var(--color-secondary);
      border-color: var(--color-secondary);
    }

    #personal-btn {
      opacity: 0.6;
    }

    #personal-btn:hover {
      opacity: 1;
    }

    .hidden {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .download-btn { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Sistema de gestión bibliotecaria</p>
    <h1>Biblio</h1>
    <p>Gestiona socios, cuotas y préstamos de libros.<br>Simple y amigable.</p>

    <button type="button" class="download-btn" id="initial-btn">
      Descargar sistema
    </button>

    <div class="options" id="options">
      <a
        class="download-btn"
        href="https://forms.gle/e6amqZn1ZCdpzJi3A"
        target="_blank"
        rel="noopener noreferrer"
      >
        Descargar para biblioteca
      </a>
      <a
        class="download-btn"
        id="personal-btn"
        href="https://github.com/CiroMirkin/biblio/releases/latest/download/Biblio-Setup.exe"
      >
        Descargar para uso personal
      </a>
    </div>

    <a
      class="download-btn hidden"
      id="update-btn"
      href="https://github.com/CiroMirkin/biblio/releases/latest/download/Biblio-Setup.exe"
    >
      Descargar actualización del sistema
    </a>
  </main>

  <script>
    var STORAGE_KEY = 'biblio_download_clicked';
    var initialBtn = document.getElementById('initial-btn');
    var options = document.getElementById('options');
    var updateBtn = document.getElementById('update-btn');
    var personalBtn = document.getElementById('personal-btn');
    var libraryBtn = options.querySelector('a[href*="forms.gle"]');

    function showUpdateView() {
      initialBtn.classList.add('hidden');
      options.classList.remove('visible');
      options.classList.add('hidden');
      updateBtn.classList.remove('hidden');
    }

    function markClicked() {
      localStorage.setItem(STORAGE_KEY, 'true');
    }

    if (localStorage.getItem(STORAGE_KEY) === 'true') {
      showUpdateView();
    }

    initialBtn.addEventListener('click', function () {
      this.classList.add('hidden');
      options.classList.add('visible');
      markClicked();
    });

    personalBtn.addEventListener('click', markClicked);
    libraryBtn.addEventListener('click', markClicked);
  </script>
</body>
</html>
