<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblio</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-white: #fef0c6;
      --color-white-accent: #fddc87;
      --color-black: #210501;
      --color-accent: #88d5dd;
      --color-secondary: #ffc55c;
      --color-red: #e7000b;
      --color-amber: #fed330;
      --color-greem: #00a63e;
      --color-gray: #fddc8789;
      --color-green: #76ccb6;
      --color-orange: #e48329;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--color-white);
      color: var(--color-black);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-orange);
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--color-black);
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--color-black);
      margin-bottom: 2.5rem;
      opacity: 0.7;
    }

    .download-btn {
      display: inline-block;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-black);
      background: var(--color-accent);
      border: 2px solid var(--color-accent);
      padding: 1rem 2.5rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .download-btn:hover {
      background: var(--color-green);
      border-color: var(--color-green);
      color: var(--color-black);
    }

    .download-btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 4px;
    }

    .options {
      display: none;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .options.visible {
      display: flex;
    }

    .options .download-btn {
      background: var(--color-white-accent);
      border-color: var(--color-white-accent);
    }

    .options .download-btn:hover {
      background: var(--color-secondary);
      border-color: var(--color-secondary);
    }

    #personal-btn {
      opacity: 0.6;
    }

    #personal-btn:hover {
      opacity: 1;
    }

    .hidden {
      display: none;
    }

    .libraries-section {
      margin-top: 4rem;
      text-align: left;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      padding: 2rem 1.5rem;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      box-sizing: border-box;
    }

    .libraries-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    
    .libraries-status {
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.7;
    }
    
    .libraries-list {
      width: 100%;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .libraries-list li {
      text-overflow: ellipsis;
      background: var(--color-gray);
      border-radius: 6px;
      padding: 0.85rem 1rem;
    }

    .library-name {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .library-location {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    @media (prefers-reduced-motion: reduce) {
      .download-btn { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Sistema de gestión bibliotecaria</p>
    <h1>Biblio</h1>
    <p>Gestiona socios, cuotas y préstamos de libros.<br>Simple y amigable.</p>

    <button type="button" class="download-btn" id="initial-btn">
      Descargar sistema
    </button>

    <div class="options" id="options">
      <a
        class="download-btn"
        href="https://forms.gle/e6amqZn1ZCdpzJi3A"
        target="_blank"
        rel="noopener noreferrer"
      >
        Descargar para biblioteca
      </a>
      <a
        class="download-btn"
        id="personal-btn"
        href="https://github.com/CiroMirkin/biblio/releases/latest/download/Biblio-Setup.exe"
      >
        Descargar para uso personal
      </a>
    </div>

    <a
      class="download-btn hidden"
      id="update-btn"
      href="https://github.com/CiroMirkin/biblio/releases/latest/download/Biblio-Setup.exe"
    >
      Descargar actualización del sistema
    </a>

    <section class="libraries-section">
      <h2>Bibliotecas que usan Biblio</h2>
      <p class="libraries-status" id="libraries-status">Cargando bibliotecas...</p>
      <ul class="libraries-list hidden" id="libraries-list"></ul>
    </section>
  </main>

  <script>
    var STORAGE_KEY = 'biblio_download_clicked';
    var initialBtn = document.getElementById('initial-btn');
    var options = document.getElementById('options');
    var updateBtn = document.getElementById('update-btn');
    var personalBtn = document.getElementById('personal-btn');
    var libraryBtn = options.querySelector('a[href*="forms.gle"]');

    function showUpdateView() {
      initialBtn.classList.add('hidden');
      options.classList.remove('visible');
      options.classList.add('hidden');
      updateBtn.classList.remove('hidden');
    }

    function markClicked() {
      localStorage.setItem(STORAGE_KEY, 'true');
    }

    if (localStorage.getItem(STORAGE_KEY) === 'true') {
      showUpdateView();
    }

    initialBtn.addEventListener('click', function () {
      this.classList.add('hidden');
      options.classList.add('visible');
      markClicked();
    });

    personalBtn.addEventListener('click', markClicked);
    libraryBtn.addEventListener('click', markClicked);

    var LIBRARIES_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTE1s6-PpXEkH_ZqkXfROa9gTX-qA-DFgQaZWlHWJ_63e2cWJzAoAGqLrVzW7QOyZ5KBmnQR21SiKs/pub?gid=1921314640&single=true&output=csv';
    var librariesStatus = document.getElementById('libraries-status');
    var librariesList = document.getElementById('libraries-list');

    function parseCsv(text) {
      var rows = [];
      var row = [];
      var field = '';
      var insideQuotes = false;

      for (var i = 0; i < text.length; i++) {
        var char = text[i];

        if (insideQuotes) {
          if (char === '"') {
            if (text[i + 1] === '"') {
              field += '"';
              i++;
            } else {
              insideQuotes = false;
            }
          } else {
            field += char;
          }
        } else {
          if (char === '"') {
            insideQuotes = true;
          } else if (char === ',') {
            row.push(field);
            field = '';
          } else if (char === '\r') {
            continue;
          } else if (char === '\n') {
            row.push(field);
            rows.push(row);
            row = [];
            field = '';
          } else {
            field += char;
          }
        }
      }

      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }

      return rows;
    }

    function renderLibraries(libraries) {
      if (libraries.length === 0) {
        librariesStatus.textContent = 'Todavía no hay bibliotecas registradas.';
        return;
      }

      librariesStatus.classList.add('hidden');
      librariesList.classList.remove('hidden');

      libraries.forEach(function (library) {
        var item = document.createElement('li');

        var name = document.createElement('div');
        name.className = 'library-name';
        name.textContent = library.nombre;

        var location = document.createElement('div');
        location.className = 'library-location';
        location.textContent = [library.ciudad, library.provincia].filter(Boolean).join(', ');

        item.appendChild(name);
        item.appendChild(location);
        librariesList.appendChild(item);
      });
    }

    fetch(LIBRARIES_CSV_URL)
      .then(function (response) {
        if (!response.ok) {
          throw new Error('No se pudo obtener la lista de bibliotecas');
        }
        return response.text();
      })
      .then(function (csvText) {
        var rows = parseCsv(csvText);
        rows.shift();

        var libraries = rows
          .filter(function (row) {
            return row.length >= 4 && row[1].trim() !== '';
          })
          .map(function (row) {
            return {
              nombre: row[1].trim(),
              ciudad: row[2].trim(),
              provincia: row[3].trim()
            };
          })
          .sort(function (a, b) {
            return a.nombre.localeCompare(b.nombre, 'es');
          });

        renderLibraries(libraries);
      })
      .catch(function () {
        librariesStatus.textContent = 'No se pudo cargar la lista de bibliotecas en este momento.';
      });
  </script>
</body>
</html>
